name: Upstream Sync

# Constitution Principle XI rule 5 — weekly merge discipline.
# Every Monday 09:00 UTC: fetch upstream/main, merge --no-ff into a sync
# branch, run the full enterprise gate, open a PR if green.

on:
  schedule:
    - cron: '0 9 * * 1'       # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upstream-sync:
    name: Merge upstream/main and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  'bifrost-upstream-sync[bot]'
          git config user.email 'bifrost-upstream-sync[bot]@users.noreply.github.com'

      - name: Add upstream remote
        env:
          UPSTREAM_URL: ${{ vars.UPSTREAM_URL }}
        run: |
          REMOTE_URL="${UPSTREAM_URL:-https://github.com/maximhq/bifrost.git}"
          git remote add upstream "$REMOTE_URL" 2>/dev/null || git remote set-url upstream "$REMOTE_URL"
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Fork is up-to-date with upstream/main; no sync needed."
          else
            echo "Fork is $BEHIND commit(s) behind upstream/main."
          fi

      - name: Create sync branch
        if: steps.check.outputs.behind != '0'
        id: branch
        run: |
          BRANCH="sync/upstream-$(date -u +%Y-%m-%d)"
          # If a branch from a previous failed run exists, append a suffix.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            BRANCH="${BRANCH}-$(date -u +%H%M)"
          fi
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Merge upstream/main (--no-ff, never rebase)
        if: steps.check.outputs.behind != '0'
        id: merge
        continue-on-error: true
        run: |
          if git merge upstream/main --no-ff -m "sync: merge upstream/main into $(date -u +%Y-%m-%d) sync branch"; then
            echo "outcome=clean" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=conflicts" >> "$GITHUB_OUTPUT"
            echo "::warning::Merge conflicts encountered. Resolution will be performed manually by a maintainer; see UPSTREAM-SYNC.md conflict playbook."
          fi

      - name: Constitution gate — Principle I (core unchanged)
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.outcome == 'clean'
        run: bash scripts/check-imports.sh || true   # warn-only on sync run; the dedicated workflow blocks PRs

      - name: Push sync branch
        if: steps.check.outputs.behind != '0'
        run: git push origin "${{ steps.branch.outputs.branch }}" --force-with-lease

      - name: Open sync PR
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.outcome == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "sync: upstream/main @ $(git rev-parse --short upstream/main)" \
            --body "$(cat <<'EOF'
          Auto-generated by `.github/workflows/upstream-sync.yml`.

          - Merged `upstream/main` into this fork's main using `--no-ff`.
          - Constitution gates were run (see job logs).
          - Reviewer: confirm CI passes the full matrix (test-core, test-plugins, test-enterprise, golden-set replay) before merging.

          See [UPSTREAM-SYNC.md](../blob/main/UPSTREAM-SYNC.md) for the conflict playbook.
          EOF
          )" \
            --label "upstream-sync"

      - name: Open conflict-recovery issue if merge failed
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.outcome == 'conflicts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Upstream sync conflicts on $(date -u +%Y-%m-%d)" \
            --label "upstream-sync,needs-resolution" \
            --body "Auto-generated by upstream-sync workflow. The Monday merge encountered conflicts that need maintainer resolution. See UPSTREAM-SYNC.md conflict playbook. Branch: ${{ steps.branch.outputs.branch }}"
