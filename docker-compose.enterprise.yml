# Local stack for enterprise integration tests (Constitution Principle VIII).
# Brings up real PostgreSQL + Redis + Weaviate + minio (S3-compatible) so that
# integration tests run against real backends rather than mocks.
#
# Usage:
#   docker compose -f docker-compose.enterprise.yml up -d
#   make test-enterprise
#   docker compose -f docker-compose.enterprise.yml down -v   # tear down + clear volumes

services:
  postgres:
    image: postgres:16-alpine
    container_name: bifrost-ent-postgres
    environment:
      POSTGRES_USER: bifrost
      POSTGRES_PASSWORD: bifrost_test
      POSTGRES_DB: bifrost_enterprise
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bifrost -d bifrost_enterprise"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - bifrost_ent_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bifrost-ent-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - bifrost_ent_redis:/data

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: bifrost-ent-weaviate
    ports:
      - "58080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: weaviate-node-1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - bifrost_ent_weaviate:/var/lib/weaviate

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: bifrost-ent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bifrost_minio
      MINIO_ROOT_PASSWORD: bifrost_minio_test
    ports:
      - "59000:9000"   # S3 API
      - "59001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - bifrost_ent_minio:/data

volumes:
  bifrost_ent_pg:
  bifrost_ent_redis:
  bifrost_ent_weaviate:
  bifrost_ent_minio:
